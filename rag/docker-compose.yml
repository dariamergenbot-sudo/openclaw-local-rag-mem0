services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openclaw-qdrant
    restart: unless-stopped
    # local-only; no LAN exposure
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rag_service:
    build:
      context: ./rag-service
    container_name: openclaw-rag-service
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - ../.secrets/rag.env
    environment:
      # inside the compose network, talk to qdrant by service name
      QDRANT_URL: http://qdrant:6333
      WORKSPACE_PATH: /workspace
      QDRANT_COLLECTION_WORKSPACE: openclaw_workspace
      # keep memory separate if/when we add mem0
      QDRANT_COLLECTION_MEM0: mem0_memory
      INCLUDE_GLOBS: "**/*.md,**/*.txt,**/*.py,**/*.js,**/*.ts,**/*.json,**/*.yaml,**/*.yml,**/*.toml"
      EXCLUDE_GLOBS: "**/.git/**,**/node_modules/**,**/.venv/**,**/__pycache__/**,**/dist/**,**/build/**,**/.secrets/**,**/*.lock,**/*.sqlite,**/*.db"
      MAX_FILE_BYTES: "2000000"
      CHUNK_SIZE: "2800"
      CHUNK_OVERLAP: "400"
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - /home/jarvis/.openclaw/workspace:/workspace:ro
      - rag_state:/state

volumes:
  qdrant_data:
  rag_state:
